---
# rbenv tasks - updated to official repos
- name: clone rbenv git repo
  git:
    repo: "https://github.com/rbenv/rbenv.git"
    dest: "~/.rbenv"
    accept_hostkey: yes
    update: yes
  become: true
  become_user: "{{ deploy_user }}"

- name: include rbenv in $PATH
  lineinfile:
    dest: "~/.profile"
    line: 'export PATH="$HOME/.rbenv/bin:$PATH"'
    state: present
    insertafter: EOF
  become: true
  become_user: "{{ deploy_user }}"

- name: load rbenv in .profile
  lineinfile:
    dest: "~/.profile"
    line: 'eval "$(rbenv init -)"'
    state: present
    insertafter: EOF
  become: true
  become_user: "{{ deploy_user }}"

- name: clone ruby-build git repo
  git:
    repo: "https://github.com/rbenv/ruby-build.git"
    dest: "~/.rbenv/plugins/ruby-build"
    accept_hostkey: yes
    update: yes
  become: true
  become_user: "{{ deploy_user }}"

- name: include ruby-build in $PATH
  lineinfile:
    dest: "~/.profile"
    line: 'export PATH="$HOME/.rbenv/plugins/ruby-build/bin:$PATH"'
    state: present
    insertafter: EOF
  become: true
  become_user: "{{ deploy_user }}"

- name: clone rbenv-gem-rehash git repo
  git:
    repo: "https://github.com/rbenv/rbenv-gem-rehash.git"
    dest: "~/.rbenv/plugins/rbenv-gem-rehash"
    accept_hostkey: yes
    update: yes
  become: true
  become_user: "{{ deploy_user }}"

- name: install Ruby 2.7.8 if not already installed
  shell: |
    export RBENV_ROOT="$HOME/.rbenv"
    export PATH="$RBENV_ROOT/bin:$RBENV_ROOT/plugins/ruby-build/bin:$PATH"
    if ! rbenv versions | grep -q "2.7.8"; then
      rbenv install 2.7.8
    fi
    rbenv global 2.7.8
    rbenv rehash
  become: true
  become_user: "{{ deploy_user }}"
  args:
    executable: /bin/bash

- name: print Ruby version
  shell: |
    export RBENV_ROOT="$HOME/.rbenv"
    export PATH="$RBENV_ROOT/bin:$RBENV_ROOT/shims:$PATH"
    ruby -v
  register: ruby_version_output
  become: true
  become_user: "{{ deploy_user }}"
  args:
    executable: /bin/bash

- name: show Ruby version
  debug:
    msg: "{{ ruby_version_output.stdout }}"

- name: set up .gemrc
  lineinfile:
    dest: "~/.gemrc"
    line: 'gem: --no-ri --no-rdoc'
    state: present
    create: yes
    insertafter: EOF
  become: true
  become_user: "{{ deploy_user }}"

- name: install bundler 2.4.20
  shell: ~/.rbenv/shims/gem install bundler -v 2.4.20
  become: true
  become_user: "{{ deploy_user }}"

- name: update system gems
  # Disabled because the latest Rubygems version (3.7.x) is incompatible with Ruby 2.7.8.
  # Running `gem update --system` would fail with:
  # "rubygems-update requires Ruby version >= 3.2.0. The current ruby version is 2.7.8.225"
  # If needed, update Rubygems to a version compatible with Ruby 2.7.x instead.
  # shell: ~/.rbenv/shims/gem update --system  become: true
  become: true
  become_user: "{{ deploy_user }}"