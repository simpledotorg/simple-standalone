# rbenv tasks
---
- name: clone rbenv git repo
  git:
    repo: "https://github.com/sstephenson/rbenv.git"
    dest: "~/.rbenv"
    accept_hostkey: "yes"
  become: true
  become_user: "{{ deploy_user }}"

- name: include rbenv in $PATH
  lineinfile: >
    dest=~/.profile
    line='export PATH="$HOME/.rbenv/bin:$PATH"'
    state=present
    insertafter=EOF
  become: true
  become_user: "{{ deploy_user }}"

- name: load rbenv in .profile
  lineinfile: >
    dest=~/.profile
    line='eval "$(rbenv init -)"'
    state=present
    insertafter=EOF
  become: true
  become_user: "{{ deploy_user }}"

- name: clone ruby-build git repo
  git:
    repo: "https://github.com/sstephenson/ruby-build.git"
    dest: "~/.rbenv/plugins/ruby-build"
    accept_hostkey: "yes"
  become: true
  become_user: "{{ deploy_user }}"

- name: include ruby-build in $PATH
  lineinfile: >
    dest=~/.profile
    line='export PATH="$HOME/.rbenv/plugins/ruby-build/bin:$PATH"'
    state=present
    insertafter=EOF
  become: true
  become_user: "{{ deploy_user }}"

- name: clone rbenv-gem-rehash git repo
  git:
    repo: "https://github.com/sstephenson/rbenv-gem-rehash.git"
    dest: "~/.rbenv/plugins/rbenv-gem-rehash"
    accept_hostkey: "yes"
  become: true
  become_user: "{{ deploy_user }}"

- name: install Ruby {{ ruby_version }} if not already installed
  shell: |
    export RBENV_ROOT="{{ rbenv_root }}"
    export PATH="$RBENV_ROOT/bin:$RBENV_ROOT/plugins/ruby-build/bin:$PATH"
    if ! rbenv versions | grep -q "{{ ruby_version }}"; then
      rbenv install {{ ruby_version }}
    fi
    rbenv global {{ ruby_version }}
    rbenv rehash
  become: true
  become_user: "{{ deploy_user }}"
  args:
    executable: /bin/bash

- name: print Ruby version
  shell: |
    export RBENV_ROOT="{{ rbenv_root }}"
    export PATH="$RBENV_ROOT/bin:$RBENV_ROOT/shims:$PATH"
    ruby -v
  register: ruby_version_output
  become: true
  become_user: "{{ deploy_user }}"
  args:
    executable: /bin/bash

- name: show Ruby version
  debug:
    msg: "{{ ruby_version_output.stdout }}"

- name: set up .gemrc
  lineinfile: >
    dest=~/.gemrc
    line='gem: --no-ri --no-rdoc'
    state=present
    create=yes
    insertafter=EOF
  become: true
  become_user: "{{ deploy_user }}"

- name: install bundler
  shell: ~/.rbenv/shims/gem install bundler -v {{ bundler_version }}
  become: true
  become_user: "{{ deploy_user }}"

- name: update system gems
  shell: ~/.rbenv/shims/gem update --system
  become: true
  become_user: deploy
